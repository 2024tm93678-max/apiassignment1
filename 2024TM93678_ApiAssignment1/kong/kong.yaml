_format_version: "3.0"
_transform: true

services:
  - name: record-label-service
    url: http://app:3000
    routes:
      - name: record-label-route
        paths:
          - /
        strip_path: false
    plugins:
      # Q2: Rate limiting (example: 10 req / minute per client IP)
      - name: rate-limiting
        config:
          minute: 10
          policy: local
          limit_by: ip

      # Q2: Request size limiting (example: 100 KB)
      - name: request-size-limiting
        config:
          allowed_payload_size: 50
          size_unit: kilobytes

